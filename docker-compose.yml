services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: justeprix
      POSTGRES_USER: justeprix
      POSTGRES_PASSWORD: justeprix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://justeprix:justeprix@postgres:5432/justeprix
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5174,https://adriendl.github.io"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://justeprix:justeprix@postgres:5432/justeprix
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  beat:
    build: ./backend
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./backend:/app

volumes:
  pgdata:
